name: Swag Labs Docker Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t swag-labs-tests .

      - name: Run tests in Docker container
        run: docker run --rm swag-labs-tests
