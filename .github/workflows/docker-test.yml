name: Swag Labs Docker Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t swag-labs-tests .

      - name: Run tests in Docker container
        id: test_run
        continue-on-error: true
        run: docker run --name test-run swag-labs-tests

      - name: Copy Allure results out of the container
        if: always()
        run: docker cp test-run:/app/allure-results ./allure-results

      - name: Remove test container
        if: always()
        run: docker rm test-run

      - name: Get previous Allure history (for trend graphs)
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report (with history trend)
        uses: simple-elf/allure-report-action@master
        if: always() && github.ref == 'refs/heads/main'
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Fail job if tests failed
        if: steps.test_run.outcome == 'failure'
        run: exit 1
